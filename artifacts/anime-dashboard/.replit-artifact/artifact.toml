kind = "web"
previewPath = "/"
title = "Anime Pipeline Dashboard"
version = "1.0.0"
id = "artifacts/anime-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21180

[services.development]
run = "pnpm --filter @workspace/anime-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anime-dashboard", "run", "build" ]
publicDir = "artifacts/anime-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21180"
BASE_PATH = "/"
